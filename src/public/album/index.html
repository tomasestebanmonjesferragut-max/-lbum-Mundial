<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Álbum · Mundial 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="topnav">
    <span class="topnav-brand">⚽ Mundial 2026</span>
    <div class="topnav-links">
        <a href="../laminas/index.html">Repetidas</a>
        <a href="index.html" class="active">Mi Álbum</a>
    </div>
</nav>

<div class="page">

    <div class="page-header">
        <h1>Mi Álbum Físico</h1>
        <p>FIFA World Cup 2026 · Panini · Solo marcá y desmarcá</p>
    </div>

    <!-- STATS -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="s-num" id="statTotal">—</div>
            <div class="s-lbl">Total</div>
        </div>
        <div class="stat-card s-green">
            <div class="s-num" id="statTengo">—</div>
            <div class="s-lbl">Tengo</div>
        </div>
        <div class="stat-card s-dim">
            <div class="s-num" id="statFaltan">—</div>
            <div class="s-lbl">Me faltan</div>
        </div>
        <div class="stat-card s-pct">
            <div class="s-num" id="statPct">0%</div>
            <div class="s-lbl">Completado</div>
        </div>
    </div>

    <div class="prog-wrap">
        <div class="prog-bar-outer">
            <div class="prog-bar-inner" id="progBar" style="width:0%"></div>
        </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <button class="tb-btn f-all" onclick="setFilter('all',this)">TODAS</button>
        <button class="tb-btn" onclick="setFilter('have',this)">TENGO</button>
        <button class="tb-btn" onclick="setFilter('miss',this)">FALTAN</button>
        <button class="tb-btn" id="btnSort" onclick="toggleSort()">↕ DEFECTO</button>
        <input class="tb-search" type="text" id="searchInput" placeholder="🔍 Buscar país..." oninput="applySearch()">
    </div>

    <div class="hint-bar">💡 Clic en una lámina para marcarla o desmarcarla · El álbum no se mezcla con las repetidas</div>

    <div id="albumContent" class="filter-all">
        <div class="loading"><div class="spinner"></div> Cargando álbum...</div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repetidas · Mundial 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="topnav">
    <span class="topnav-brand">⚽ Mundial 2026</span>
    <div class="topnav-links">
        <a href="index.html" class="active">Repetidas</a>
        <a href="../album/index.html">Mi Álbum</a>
    </div>
</nav>

<div class="container">
    <div class="header">
        <h1>Láminas Repetidas</h1>
        <h3 style="color: var(--text-dim);">Gestión de intercambio · Mundial 2026</h3>
    </div>

    <div class="panel">
        <h3>Ingresar Láminas</h3>
        <div style="margin-bottom:8px; color: var(--text-dim); font-size:0.85rem;">
            Podés ingresar una o varias separadas por coma. Ej: <b style="color:var(--neon-cyan)">MEX1, ARG12, SCO5-8</b>
        </div>
        <div class="input-row">
            <input type="text" id="codigoLamina"
                   placeholder="Ej: MEX1, ARG12"
                   style="text-transform:uppercase; flex:1;"
                   oninput="verificarPrefijo()"
                   autocomplete="off" autocorrect="off" spellcheck="false">
            <button class="btn-agregar" id="btnAgregar" onclick="agregarLamina()">+ INGRESAR</button>
            <button class="btn-modificar" id="btnModificar" onclick="abrirModificarManual()">✎ MODIFICAR</button>
        </div>
        <small id="ayudaPais" class="ayuda-hint"></small>
    </div>

    <div class="panel">
        <div class="panel-hd">
            <h3 style="margin:0;">Mis Láminas Repetidas</h3>
            <input type="text" id="buscador" placeholder="🔍 Buscar..." onkeyup="filtrarLaminas()" class="buscador-inline">
        </div>
        <div id="listaLaminas" style="margin-top:15px;"></div>
    </div>
</div>

<!-- MODAL MODIFICAR -->
<div id="modalModificar" class="modal">
    <div class="modal-content">
        <h3 id="modalTitulo" style="color:var(--neon-cyan);margin-top:0;">Modificar Lámina</h3>
        <p id="modalMensaje" style="color:var(--text-dim);font-size:0.9em;margin-bottom:20px;"></p>
        <div id="bloqueNumero" style="display:none;text-align:left;margin-bottom:15px;">
            <label style="color:var(--text-main);font-size:0.9em;font-weight:bold;">Código (ej: MEX1):</label>
            <input type="text" id="modalInputNumero" placeholder="Ej: MEX1" style="margin-top:8px;text-transform:uppercase;">
        </div>
        <div style="text-align:left;margin-bottom:20px;">
            <label style="color:var(--text-main);font-size:0.9em;font-weight:bold;">Nueva cantidad total:</label>
            <input type="number" id="modalInputCantidad" min="0" placeholder="Ej: 2" style="margin-top:8px;">
        </div>
        <div class="modal-acciones">
            <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-guardar" onclick="procesarModal()">Guardar</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="script.js"></script>
</body>
</html>
